name: Draft Release on Version Change

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  draft_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version info
        id: version
        run: |
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts)
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get previous tag
        id: prev_tag
        if: steps.check.outputs.exists == 'false'
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${{ steps.version.outputs.tag }}$" | head -n1 || echo "")
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Get commit info
        id: commit
        if: steps.check.outputs.exists == 'false'
        run: |
          echo "title=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"
          {
            echo "message<<EOF"
            git log -1 --pretty=%B
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create draft release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Music.axs ${{ steps.version.outputs.version_name }} (${{ steps.version.outputs.version_code }}) - ${{ steps.commit.outputs.title }}"
          target_commitish: "main"
          draft: true
          files: ""
          body: |
            ### Change log

            ${{ steps.commit.outputs.message }}
